name: Docker Publish Nightly Image CI
on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch to build'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (manual runs only; cron uses the ref gate)'
        required: false
        type: choice
        default: linux/amd64,linux/arm64
        options:
          - linux/amd64
          - linux/amd64,linux/arm64
          - linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Resolve branch, tag and platforms
      id: resolve
      run: |
        REF="${{ inputs.ref || github.ref_name }}"
        case "$REF" in
          main)    TAG="stable-nightly";       HUMHUB_BRANCH="master"  ;;
          develop) TAG="experimental-nightly"; HUMHUB_BRANCH="develop" ;;
          *)       TAG="${REF#v}-nightly";     HUMHUB_BRANCH="$REF" ;;
        esac

        # Manual dispatch may pick the platforms explicitly. The cron / workflow_call
        # path supplies no such input, so fall back to the ref gate: only develop
        # (experimental-nightly) is multiarch; every other ref stays amd64-only.
        PLATFORMS="${{ inputs.platforms }}"
        if [ -z "$PLATFORMS" ]; then
          case "$REF" in
            develop) PLATFORMS="linux/amd64,linux/arm64" ;;
            *)       PLATFORMS="linux/amd64" ;;
          esac
        fi

        echo "ref=$REF"                     >> $GITHUB_OUTPUT
        echo "tag=$TAG"                     >> $GITHUB_OUTPUT
        echo "humhub_branch=$HUMHUB_BRANCH" >> $GITHUB_OUTPUT
        echo "platforms=$PLATFORMS"         >> $GITHUB_OUTPUT

    - uses: actions/checkout@v4
      with:
        ref: ${{ steps.resolve.outputs.ref }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker Login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: docker login -u $DOCKER_USER -p $DOCKER_PASSWORD

    - name: Generate immutable tag
      id: immutable
      run: |
        TIMESTAMP=$(date -u '+%Y%m%d%H%M%S')
        GIT_SHA=$(git ls-remote https://github.com/humhub/humhub.git refs/heads/${{ steps.resolve.outputs.humhub_branch }} | cut -c1-7)
        echo "value=${{ steps.resolve.outputs.tag }}-${TIMESTAMP}-${GIT_SHA}" >> $GITHUB_OUTPUT

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ./image
        file: ./image/Dockerfile
        platforms: ${{ steps.resolve.outputs.platforms }}
        push: true
        build-args: |
          HUMHUB_GIT_BRANCH=${{ steps.resolve.outputs.humhub_branch }}
        tags: |
          humhub/humhub:${{ steps.resolve.outputs.tag }}
          humhub/humhub:${{ steps.immutable.outputs.value }}
